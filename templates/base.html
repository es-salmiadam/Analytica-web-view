<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Analytica{% endblock %} — Social Media Analysis</title>
    <meta name="description"
        content="Analytica: An intelligent social media analysis dashboard for deep insights into Twitter engagement, sentiment, and trends.">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <h2>Analytica<span class="highlight">.</span></h2>
                <p>Social Media Intelligence</p>
            </div>
            <nav>
                <ul>
                    <li class="{{ 'active' if active_page == 'dashboard' }}">
                        <a href="/">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <rect x="3" y="3" width="7" height="7" rx="1" />
                                <rect x="14" y="3" width="7" height="7" rx="1" />
                                <rect x="3" y="14" width="7" height="7" rx="1" />
                                <rect x="14" y="14" width="7" height="7" rx="1" />
                            </svg>
                            Dashboard
                        </a>
                    </li>
                    <li class="{{ 'active' if active_page == 'sentiment' }}">
                        <a href="/sentiment">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <circle cx="12" cy="12" r="10" />
                                <path d="M8 14s1.5 2 4 2 4-2 4-2" />
                                <line x1="9" y1="9" x2="9.01" y2="9" />
                                <line x1="15" y1="9" x2="15.01" y2="9" />
                            </svg>
                            Sentiment
                        </a>
                    </li>
                    <li class="{{ 'active' if active_page == 'engagement' }}">
                        <a href="/engagement">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
                            </svg>
                            Engagement
                        </a>
                    </li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <p>PFE Project</p>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <div class="topbar-left">
                    <h1>{% block page_title %}Dashboard{% endblock %}</h1>
                    <p class="breadcrumb">{% block breadcrumb %}Home / Overview{% endblock %}</p>
                </div>
            </header>

            {% block content %}{% endblock %}
        </main>
    </div>

    {% block scripts %}{% endblock %}
</body>

</html>
